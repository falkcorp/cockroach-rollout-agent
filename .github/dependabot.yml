# file: .github/dependabot.yml
# version: 1.1.0
# guid: 05957804-90aa-4fb0-884f-2761e67805af
# last-edited: 2026-07-17

version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: weekly
      day: tuesday
      time: "10:00"
      timezone: America/New_York
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: deps
      include: scope

updates:
  # Cargo
  - package-ecosystem: cargo
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - tech:rust
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # Docker
  - package-ecosystem: docker
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - containers

  # Github Actions
  - package-ecosystem: github-actions
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - github-actions
      - ci-cd