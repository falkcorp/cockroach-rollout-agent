# file: .github/workflows/release-assets.yml
# version: 1.3.0
# guid: 6ac4e69b-1c8d-4465-bb8d-d4b950850d0a

name: Release Linux Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to"
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  linux-assets:
    name: Build Linux Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.87"
          target: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu
          cache: true

      - name: Install arm64 linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build amd64
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Build arm64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu

      - name: Package assets
        run: |
          mkdir -p dist/pkg
          cp target/x86_64-unknown-linux-gnu/release/cockroach-rollout-agent dist/pkg/cockroach-rollout-agent
          tar -C dist/pkg -czf dist/cockroach-rollout-agent-linux-amd64.tar.gz cockroach-rollout-agent
          cp target/aarch64-unknown-linux-gnu/release/cockroach-rollout-agent dist/pkg/cockroach-rollout-agent
          tar -C dist/pkg -czf dist/cockroach-rollout-agent-linux-arm64.tar.gz cockroach-rollout-agent
          cd dist
          sha256sum cockroach-rollout-agent-linux-amd64.tar.gz cockroach-rollout-agent-linux-arm64.tar.gz > SHA256SUMS

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            dist/cockroach-rollout-agent-linux-amd64.tar.gz \
            dist/cockroach-rollout-agent-linux-arm64.tar.gz \
            dist/SHA256SUMS \
            --clobber

      - name: Attest release assets
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/cockroach-rollout-agent-linux-amd64.tar.gz
            dist/cockroach-rollout-agent-linux-arm64.tar.gz
            dist/SHA256SUMS
