# file: .github/workflows/pages.yml
# version: 1.0.1
# guid: 14d75f8c-45eb-46df-a445-f06f6b71ead4

name: Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - scripts/install.sh
      - examples/cockroach-rollout-agent.env.example
      - examples/cockroach-rollout-agent.service
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp scripts/install.sh _site/install.sh
          cp examples/cockroach-rollout-agent.service _site/cockroach-rollout-agent.service
          cp examples/cockroach-rollout-agent.env.example _site/cockroach-rollout-agent.env.example

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
